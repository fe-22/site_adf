{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Painel AD Fidelidade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/painel.css' %}">
</head>
<body>
<div class="login-page">
  <div class="login-box">

    <div class="login-logo">
      <img src="{% static 'img/logo.png' %}" alt="AD Fidelidade">
      <h2>AD Fidelidade Sede</h2>
      <p>Painel do Gestor</p>
    </div>

    {% if messages %}
    <div class="p-alerts">
      {% for message in messages %}
      <div class="p-alert p-alert-error">
        <i class="fa-solid fa-circle-exclamation"></i> {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="post" class="p-form">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_username"><i class="fa-solid fa-user" style="color:var(--p-brown);margin-right:0.3rem;"></i> Usuário</label>
        <input type="text" id="id_username" name="username" autocomplete="username" autofocus required>
      </div>
      <div class="form-group">
        <label for="id_password"><i class="fa-solid fa-lock" style="color:var(--p-brown);margin-right:0.3rem;"></i> Senha</label>
        <input type="password" id="id_password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="p-btn p-btn-primary" style="width:100%;justify-content:center;padding:0.75rem;font-size:0.95rem;margin-top:0.5rem;">
        <i class="fa-solid fa-right-to-bracket"></i> Entrar
      </button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;">
      <a href="/" style="font-size:0.8rem;color:var(--p-text-soft);">
        <i class="fa-solid fa-arrow-left"></i> Voltar ao site
      </a>
    </p>
  </div>
</div>
</body>
</html>
